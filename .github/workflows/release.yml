name: release

# Builds prebuilt binaries (consumed by install.sh) and a Docker image on tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cp target/release/abe abe-linux-x86_64
      - uses: softprops/action-gh-release@v2
        with:
          files: abe-linux-x86_64

  macos:
    # Apple Silicon runner builds BOTH mac targets (x86_64 is cross-compiled),
    # so we don't depend on scarce macos-13 (Intel) runners.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin
      - run: cp target/aarch64-apple-darwin/release/abe abe-macos-arm64
      - run: cp target/x86_64-apple-darwin/release/abe abe-macos-x86_64
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            abe-macos-arm64
            abe-macos-x86_64

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
