# Abe config — add 1 to 5 models, then:  abe debate "your question"
# Copy to ./abe.yaml or ~/.config/abe/config.yaml (the installer writes a copy there).

defaults:
  temperature: 0.7
  max_tokens: 1024
  timeout_secs: 120
  retries: 2          # HTTP providers only (CLI providers are not retried)

models:
  # --- A model on your network (vLLM / Ollama / LM Studio). No key = no auth. ---
  # - { name: local, kind: openai-compatible, model: "your-model-id", base_url: "http://192.168.1.10:8000/v1" }

  # --- A cloud model (set the env var with your key) ---
  # - { name: gpt,    kind: openai,    model: gpt-5.5,         api_key_env: OPENAI_API_KEY }
  # - { name: claude, kind: anthropic, model: claude-opus-4-8, api_key_env: ANTHROPIC_API_KEY }

  # --- Local CLIs (no API key needed; must be installed and on PATH) ---
  # `persona:` gives a model a debating voice (a bundled name from `abe personas`,
  # a file path, or inline text). Optional; default is no persona.
  - { name: codex,  kind: cli, cli: codex, fast: true, persona: the-challenger }
  - { name: claude, kind: cli, cli: claude }

debate:
  rounds: 1            # 0 = broadcast + decide only
  protocol: synthesis  # synthesis | majority | judge
  anonymize: true      # hide model identities during cross-review
  min_models: 2        # abort if fewer than this respond
  context_scope: full  # which stages see `debate --files`: off | first | chair-first | full
  context_max_tokens: 12000  # cap on attached --files context (~4 chars/token); over this
                             # it's truncated, or summarized to fit with `debate --lede`
  # max_secs: 540      # optional overall budget: past this, skip remaining
                       # critique rounds and decide with what's in. Keeps long
                       # debates under a caller's tool-call timeout (e.g. MCP).

validate:
  reviewers: [codex]   # default reviewer(s) for `abe validate`
